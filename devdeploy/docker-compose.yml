version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: devdeploy
      POSTGRES_PASSWORD: devdeploy_password
      POSTGRES_DB: devdeploy_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_USER=devdeploy
      - DB_PASSWORD=devdeploy_password
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=devdeploy_db
      - PORT=5000
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
